<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .container {
            width: 1000px;
            height: 800px;
        }

        header {
            width: 200px;
            height: 800px;
            background-color: goldenrod;
            float: left;
        }

        header h1 {
            margin: 10px auto;
            width: 150px;
        }

        header h1 img {
            /* width: 150px; */
            width: 100%;
        }

        header ul {
            list-style: none;
            width: 180px;
            border: 1px solid #333;
            margin: 0 auto;
        }

        ul li a {
            display: block;
            width: 180px;
            height: 40px;
            line-height: 40px;
            text-decoration: none;
            text-align: center;
            color: #333;
        }

        header ul li a:hover {
            background-color: #555;
            color: #FFF;
        }

        section {
            width: 800px;
            height: 700px;
            float: left;
            background-color: blue;
        }

        section .img_slider {
            width: 800px;
            height: 400px;
            background-color: yellow;
        }

        section .content {
            width: 800px;
            height: 300px;
            background-color: slateblue;
        }

        .content div{
            width: 33.3333%;
            height: 300px;
            float: left;
        }

        .content .notice {
            background-color: green;
        }

        .content .banner {
            background-color: greenyellow;
        }

        .content .icons {
            background-color: yellowgreen;
        }

        footer {
            width: 800px;
            height: 100px;
            background-color: #333;
            float: right;
        }

        .f_logo {
            width: 200px;
            height: 100px;
            float: left;
            background-color: #777;
        }

        .f_menu {
            width: 600px;
            height: 50px;
            float: left;
            background-color: #111;
        }

        .f_copy {
            width: 600px;
            height: 50px;
            float: left;
            background-color: #555;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1 class="logo">
                <img src="images/LOGO.png" alt="LOGO">
            </h1>

            <ul>
                <li><a href="#">MENU-1</a></li>
                <li><a href="#">MENU-2</a></li>
                <li><a href="#">MENU-3</a></li>
                <li><a href="#">MENU-4</a></li>
            </ul>
        </header>
        <section>
            <div class="img_slider"></div>
            <div class="content">
                <div class="notice">notice</div>
                <div class="banner">banner</div>
                <div class="icons">icons</div>
            </div>
        </section>
        <footer>
            <div class="f_logo"></div>
            <div class="f_menu"></div>
            <div class="f_copy"></div>
        </footer>
    </div>
</body>

</html>
